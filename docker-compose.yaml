version: '3.8'

services:
  broker:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: python broker.py
    networks:
      - chat-net
    ports:
      - "5555:5555"
      - "5556:5556"

  pubsub-proxy:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: python pubsub_proxy.py
    networks:
      - chat-net
    ports:
      - "5557:5557"
      - "5558:5558"

  server-1:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - SERVER_ID=server_1
      - BROKER_URL=tcp://broker:5556
      - PUBSUB_URL=tcp://pubsub-proxy:5557
    command: python server.py
    volumes:
      - server1-data:/app/data
    depends_on:
      - broker
      - pubsub-proxy
    networks:
      - chat-net

  server-2:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - SERVER_ID=server_2
      - BROKER_URL=tcp://broker:5556
      - PUBSUB_URL=tcp://pubsub-proxy:5557
    command: python server.py
    volumes:
      - server2-data:/app/data
    depends_on:
      - broker
      - pubsub-proxy
    networks:
      - chat-net

  client-1:
    build:
      context: .
      dockerfile: client/Dockerfile
    environment:
      - BOT_NAME=bot_alice
      - BROKER_URL=tcp://broker:5555
      - PUBSUB_URL=tcp://pubsub-proxy:5558
    depends_on:
      - broker
      - pubsub-proxy
      - server-1
      - server-2
    networks:
      - chat-net

  client-2:
    build:
      context: .
      dockerfile: client/Dockerfile
    environment:
      - BOT_NAME=bot_bob
      - BROKER_URL=tcp://broker:5555
      - PUBSUB_URL=tcp://pubsub-proxy:5558
    depends_on:
      - broker
      - pubsub-proxy
      - server-1
      - server-2
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge

volumes:
  server1-data:
  server2-data:
