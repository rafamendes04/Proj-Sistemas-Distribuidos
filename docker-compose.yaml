version: '3.8'

services:
  # O Broker ZeroMQ abstrai a arquitetura multi-node mantendo clientes independentes do número de servidores
  broker:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: python broker.py
    networks:
      - chat-net
    ports:
      - "5555:5555"
      - "5556:5556"

  # Primeiro nó servidor atuando de forma distribuída, cada nó mantém seu banco via volumes separados
  server-1:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - SERVER_ID=server_1
      - BROKER_URL=tcp://broker:5556
    command: python server.py
    volumes:
      - server1-data:/app/data
    depends_on:
      - broker
    networks:
      - chat-net

  # Segundo nó servidor provendo concorrência/alta disponibilidade via Router/Dealer do Broker
  server-2:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - SERVER_ID=server_2
      - BROKER_URL=tcp://broker:5556
    command: python server.py
    volumes:
      - server2-data:/app/data
    depends_on:
      - broker
    networks:
      - chat-net

  # Instância Cliente Bot 1 (Java)
  client-1:
    build:
      context: .
      dockerfile: client/Dockerfile
    environment:
      - BOT_NAME=bot_alice
      - BROKER_URL=tcp://broker:5555
    depends_on:
      - broker
      - server-1
      - server-2
    networks:
      - chat-net

  # Instância Cliente Bot 2 (Java)
  client-2:
    build:
      context: .
      dockerfile: client/Dockerfile
    environment:
      - BOT_NAME=bot_bob
      - BROKER_URL=tcp://broker:5555
    depends_on:
      - broker
      - server-1
      - server-2
    networks:
      - chat-net

# Uma rede em formato Bridge exclusiva para as aplicações se comunicarem via TCP ZeroMQ
networks:
  chat-net:
    driver: bridge

# Definição e isolamento estrutural dos dados, garantindo separação conforme exigido para persistência independente
volumes:
  server1-data:
  server2-data:
