syntax = "proto3";

package chat;

option java_package = "com.chat.proto";
option java_outer_classname = "ChatProto";

// Tipos de mensagens suportadas pelo sistema
enum MessageType {
    UNKNOWN = 0;
    LOGIN_REQ = 1;
    LOGIN_RESP = 2;
    CREATE_CHANNEL_REQ = 3;
    CREATE_CHANNEL_RESP = 4;
    LIST_CHANNELS_REQ = 5;
    LIST_CHANNELS_RESP = 6;
}

// Status de resposta padronizado
enum Status {
    SUCCESS = 0;
    ERROR = 1;
}

// Wrapper principal que conterá todas as mensagens que transitam no ZeroMQ
message Wrapper {
    MessageType type = 1;
    int64 timestamp = 2;

    // Apenas um dos payloads abaixo será preenchido
    oneof payload {
        LoginRequest login_req = 3;
        LoginResponse login_resp = 4;
        CreateChannelRequest create_channel_req = 5;
        CreateChannelResponse create_channel_resp = 6;
        ListChannelsRequest list_channels_req = 7;
        ListChannelsResponse list_channels_resp = 8;
    }
}

// ---- Definição de Payloads ----

message LoginRequest {
    string username = 1;
}

message LoginResponse {
    Status status = 1;
    string message = 2;
}

message CreateChannelRequest {
    string channel_name = 1;
}

message CreateChannelResponse {
    Status status = 1;
    string message = 2;
}

message ListChannelsRequest {
    // Pode ser vazio, usado apenas para requisitar a listagem
}

message ListChannelsResponse {
    Status status = 1;
    repeated string channels = 2;
    string message = 3;
}
